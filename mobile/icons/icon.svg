<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#1e1e2e"/>

  <!-- Outer ring — dashed quarters with gaps at crosshair arms -->
  <circle cx="256" cy="256" r="188" fill="none" stroke="#cba6f7" stroke-width="10"
    stroke-dasharray="82 12 82 12 82 12 82 12"
    stroke-dashoffset="47"
    opacity="0.9"/>

  <!-- Middle ring -->
  <circle cx="256" cy="256" r="124" fill="none" stroke="#cba6f7" stroke-width="5" opacity="0.35"/>

  <!-- Crosshair arms — top -->
  <line x1="256" y1="52"  x2="256" y2="168" stroke="#cba6f7" stroke-width="10" stroke-linecap="round"/>
  <!-- bottom -->
  <line x1="256" y1="344" x2="256" y2="460" stroke="#cba6f7" stroke-width="10" stroke-linecap="round"/>
  <!-- left -->
  <line x1="52"  y1="256" x2="168" y2="256" stroke="#cba6f7" stroke-width="10" stroke-linecap="round"/>
  <!-- right -->
  <line x1="344" y1="256" x2="460" y2="256" stroke="#cba6f7" stroke-width="10" stroke-linecap="round"/>

  <!-- Corner brackets — teal accent -->
  <!-- Top-left -->
  <path d="M116 116 L116 164 M116 116 L164 116" stroke="#94e2d5" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Top-right -->
  <path d="M396 116 L396 164 M396 116 L348 116" stroke="#94e2d5" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Bottom-left -->
  <path d="M116 396 L116 348 M116 396 L164 396" stroke="#94e2d5" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Bottom-right -->
  <path d="M396 396 L396 348 M396 396 L348 396" stroke="#94e2d5" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Center dot with glow ring -->
  <circle cx="256" cy="256" r="28" fill="none" stroke="#cba6f7" stroke-width="3" opacity="0.4"/>
  <circle cx="256" cy="256" r="14" fill="#cba6f7"/>

  <!-- Small tick marks on outer ring at 45° (between crosshairs) -->
  <line x1="389" y1="123" x2="376" y2="136" stroke="#cba6f7" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="123" y1="123" x2="136" y2="136" stroke="#cba6f7" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="123" y1="389" x2="136" y2="376" stroke="#cba6f7" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <line x1="389" y1="389" x2="376" y2="376" stroke="#cba6f7" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
